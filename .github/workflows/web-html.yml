name: Deploy static website on EC2

on:
  push:
    branches: ["main"]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: connect EC2 via SSH
      run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > mykey.pem
          chmod 600 mykey.pem
    - name: copy HTML file
      run: |
          scp -o StrictHostKeyChecking=no -i mykey.pem $(find . -type f \( -name "*.html" )) \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/html/
    - name: Restart Apache (httpd)
      run: |
          ssh -o StrictHostKeyChecking=no -i key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
          "sudo service httpd restart"
          

  
    
