<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Static Website on EC2</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #1e3a8a;
        }
        p {
            color: #374151;
            font-size: 18px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: 30px auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Welcome to My Static Website!</h1>
        <p>This website is deployed on an EC2 instance using GitHub Actions.</p>
        <p>CI → Build → Deploy ✔</p>
    </div>
</body>
</html>
